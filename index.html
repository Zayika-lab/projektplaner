/* ═══════════════════════════════════════════════════════════════
   7. WEEK VIEW
   ═══════════════════════════════════════════════════════════════ */

// HOUR_START / HOUR_END тепер редаговані у налаштуваннях додатку.
// Дефолтні значення; синхронізуються з state.settings перед кожним рендером.
let HOUR_START = 6, HOUR_END = 22;
function applyDayHourSettings(){
  const s = state.settings || {};
  const ds = Number(s.dayStart);
  const de = Number(s.dayEnd);
  HOUR_START = Number.isFinite(ds) && ds>=0 && ds<=23 ? ds : 6;
  HOUR_END   = Number.isFinite(de) && de>HOUR_START && de<=24 ? de : 22;
}
const HOUR_H = 52;
// Висота заголовку блоку (wb-head) — компенсується у spacer,
// щоб task-міні-блок починався рівно на часовій лінії
const WB_HEAD_HEIGHT = 26;

function renderWeek(){
  // Застосовуємо налаштування годин дня + перебудовуємо кеш розподілу
  applyDayHourSettings();
  invalidateFillCache();
  const ws = parseISO(state.weekStart);
  const today = new Date(); today.setHours(0,0,0,0);
  const head = document.getElementById("weekHead");
  head.innerHTML = `<div></div>` + [0,1,2,3,4,5,6].map(i=>{
    const d = addDays(ws, i);
    const t = sameDay(d, today);
    return `<div class="dh ${t?'today':''}">
      <div class="dname">${fmtWeekday(d)}</div>
      <div class="dnum">${d.getDate()}. ${fmtMonthShort(d)}</div>
    </div>`;
  }).join("");

  const grid = document.getElementById("weekGrid");
  grid.innerHTML = "";
  // time column
  const tc = document.createElement("div");
  tc.className = "week-timecol";
  for (let h=HOUR_START; h<=HOUR_END; h++){
    const hr = document.createElement("div");
    hr.className = "hr";
    hr.textContent = pad(h)+":00";
    tc.appendChild(hr);
  }
  grid.appendChild(tc);

  // 7 day cols
  for (let i=0; i<7; i++){
    const col = document.createElement("div");
    col.className = "week-daycol";
    col.dataset.dow = String((i+1) % 7 === 0 ? 0 : (i+1)); // not used
    col.dataset.dayIndex = i;
    const d = addDays(ws, i);
    if (sameDay(d, today)) col.classList.add("today");
    for (let h=HOUR_START; h<=HOUR_END; h++){
      const hl = document.createElement("div");
      hl.className = "hour-line";
      col.appendChild(hl);
    }
    grid.appendChild(col);

    // blocks for this day
    const dowGerman = ((i)%7); // 0..6 where 0=Mon
    const blocksForDay = getBlocksForDay(dowGerman, iso(d));
    blocksForDay.forEach(b=>{
      renderWeekBlock(col, b, d);
    });
  }

  // now line
  if (sameDay(today, today)){
    const now = new Date();
    const mins = now.getHours()*60 + now.getMinutes();
    const dow = (now.getDay()+6)%7;
    const colEl = grid.children[1 + dow];
    if (colEl && now >= ws && now < addDays(ws, 7)){
      const top = (mins - HOUR_START*60)/60 * HOUR_H;
      if (top >= 0 && top <= (HOUR_END-HOUR_START+1)*HOUR_H){
        const nl = document.createElement("div");
        nl.className = "now-line";
        nl.style.top = top+"px";
        nl.style.left = "0"; nl.style.right = "0";
        nl.style.width = "auto";
        nl.style.height = "0";
        nl.style.borderLeft = "0";
        nl.style.borderTop = "1.5px solid var(--now)";
        const dot = document.createElement("div");
        dot.style.cssText = "position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:var(--now)";
        nl.appendChild(dot);
        colEl.style.position="relative";
        colEl.appendChild(nl);
      }
    }
  }
}

function getBlocksForDay(dow, dateISO){
  // blocks whose weekId === state.weekStart (this week's overrides), else template (weekId===null)
  const overrides = state.blocks.filter(b=>b.dow===dow && b.weekId===state.weekStart);
  if (overrides.length) {
    // if this week has overrides in general, only use overrides for this day.
    // BUT if the user has the concept of "this week has its own schedule" — we apply only override rule per day.
    return overrides;
  }
  return state.blocks.filter(b=>b.dow===dow && b.weekId===null);
}

function renderWeekBlock(col, block, date){
  const startMin = minutesFromHHMM(block.start);
  const endMin   = minutesFromHHMM(block.end);
  const top = (startMin - HOUR_START*60)/60 * HOUR_H;
  const height = (endMin - startMin)/60 * HOUR_H;

  const el = document.createElement("div");
  el.className = "wblock" + (block.weekId===null ? " template" : "");
  el.style.top = top+"px";
  el.style.height = height+"px";
  el.dataset.blockId = block.id;

  // Заповнення блоку (підраховує задачі + overflow ланцюжок)
  const fill = computeBlockFill(block, date);
  el.style.color = fill.projectColor || "var(--ink-3)";
  // Колір блоку: рамка переймає обраний колір (чітко, без прозорості);
  // фон — легкий відтінок цього ж кольору
  if (block.color){
    el.style.background = hexWithAlpha(block.color, 0.10);
    el.style.borderColor = block.color;
    el.style.borderWidth = "2px";
  }

  el.innerHTML = `
    ${block.color ? `<div class="wb-color-bar" style="background:${block.color}"></div>` : ""}
    <div class="wb-fill" style="height:${fill.pct*100}%"></div>
    <div class="wb-resize top" data-edge="top"></div>
    <div class="wb-resize bot" data-edge="bot"></div>
    <div class="wb-head">
      <div class="wb-title">${escapeHtml(block.title)}</div>
      <div class="wb-time">${block.start}–${block.end}</div>
    </div>
    <div class="wb-body">
      ${fill.items.map((it, idx)=>{
        // Висота елемента пропорційна до хвилин (заголовок блоку тепер НАД блоком,
        // тому висоту компенсувати не треба — task займає повну пропорцію)
        let h = Math.round(it.mins * (HOUR_H/60));
        if (it._spacer){
          if (h <= 0) return "";
          return `<div class="wb-spacer" style="height:${h}px;flex:0 0 ${h}px"></div>`;
        }
        h = Math.max(14, h);
        const side = it.color ? `box-shadow: inset 3px 0 0 ${it.color}; padding-left: 9px;` : "";
        // Маленькі task (висотою < 28px) — назва винесена зовні справа, з leader-лінією.
        // Всередині лишаються тільки хвилини + "×" для компактності.
        const compact = h < 28;
        const titleHtml = compact
          ? `<span class="tt-outside">${escapeHtml(it.title)}</span>`
          : `<span class="tt">${escapeHtml(it.title)}</span>`;
        return `
          <div class="wb-task ${it.done?'done':''} ${compact?'is-compact':''}" data-task-id="${it.id}" title="${escapeHtml(it.title)}" style="height:${h}px;flex:0 0 ${h}px;${side}">
            <span class="ts">${it.mins}m</span>
            ${titleHtml}
            <span class="tx" data-act="detach" title="Aus Block entfernen">×</span>
            <span class="wt-resize" data-act="resize" title="Dauer ändern"></span>
          </div>
        `;
      }).join("")}
    </div>
    ${fill.items.length ? `<div class="wb-cap">${fill.usedMin}/${endMin-startMin}m</div>` : ""}
  `;
  col.appendChild(el);

  // Клік: редагувати задачу всередині (блок — тільки по dblclick)
  el.addEventListener("click",(e)=>{
    if (el._suppressClick){ el._suppressClick = false; return; }
    // Кнопка "×" всередині task — викидає task з блоку назад у список
    const tx = e.target.closest(".tx");
    if (tx && tx.dataset.act === "detach"){
      const taskEl = tx.closest(".wb-task");
      const tid = taskEl?.dataset.taskId;
      const t = state.tasks.find(x=>x.id===tid);
      if (t){
        t.blockId = null;
        delete t.startMinInBlock;
        persist(); renderWeek(); renderTaskList();
      }
      return;
    }
    if (e.target.closest(".wb-task")){
      const tid = e.target.closest(".wb-task").dataset.taskId;
      const t = state.tasks.find(x=>x.id===tid);
      if (t) editWeekTask(t);
    }
  });
  // Подвійний клік — редагування блоку
  el.addEventListener("dblclick",(e)=>{
    if (e.target.closest(".wb-task")) return; // dblclick по task не відкриває блок
    e.stopPropagation();
    editBlock(block);
  });

  // Drop-індикація для перетягування завдань з sidebar
  el.addEventListener("pointerenter",()=>{ if (document.body.classList.contains("dragging-task")) el.classList.add("drop-target")});
  el.addEventListener("pointerleave",()=>el.classList.remove("drop-target"));

  // Drag самого блоку (за заголовок) — переміщення по тижневій сітці
  attachBlockDrag(el, block);
  // Resize — перетягування верхнього/нижнього краю змінює start/end (крок 15 хв)
  attachBlockResize(el, block);
  // Drag завдань всередині блоку — щоб переносити в інший блок
  el.querySelectorAll(".wb-task").forEach(tEl=>{
    const tid = tEl.dataset.taskId;
    const t = state.tasks.find(x=>x.id===tid);
    if (t){
      attachInBlockTaskDrag(tEl, t, el);
      attachTaskResize(tEl, t);
    }
  });
}

/* Resize task-міні-блоку: тягнемо ручку знизу щоб змінити task.duration (крок 15 хв) */
function attachTaskResize(tEl, task){
  const handle = tEl.querySelector(".wt-resize");
  if (!handle) return;
  handle.addEventListener("pointerdown",(ev)=>{
    if (ev.button !== 0) return;
    ev.stopPropagation();
    ev.preventDefault();
    const startY = ev.clientY;
    const origDuration = task.duration;
    handle.setPointerCapture?.(ev.pointerId);
    const onMove = (e)=>{
      const dy = e.clientY - startY;
      const dmin = Math.round(dy / HOUR_H * 60 / 15) * 15; // крок 15 хв
      const newDur = Math.max(15, origDuration + dmin);
      task.duration = newDur;
      // Оновлення візуальної висоти без повного ре-рендера
      const h = Math.max(14, Math.round(newDur * (HOUR_H/60)));
      tEl.style.height = h + "px";
      tEl.style.flex = `0 0 ${h}px`;
      const tsEl = tEl.querySelector(".ts");
      if (tsEl) tsEl.textContent = newDur + "m";
    };
    const onUp = ()=>{
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      tEl.closest(".wblock")._suppressClick = true;
      persist(); renderWeek();
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

// Утиліта: hex колір + альфа (для напівпрозорого фону блоку)
function hexWithAlpha(hex, alpha){
  if (!hex || hex[0] !== "#") return hex;
  const h = hex.replace("#","");
  const v = h.length===3 ? h.split("").map(c=>c+c).join("") : h;
  const r = parseInt(v.slice(0,2),16), g = parseInt(v.slice(2,4),16), b = parseInt(v.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* Повертає ВСІ блоки тижня з заданим title, відсортовані за (dow, start).
   Враховує логіку template/override через getBlocksForDay(). */
function getBlocksForWeek(title){
  const chain = [];
  const ws = parseISO(state.weekStart);
  for (let d=0; d<7; d++){
    const dayISO = iso(addDays(ws, d));
    const dayBlocks = getBlocksForDay(d, dayISO).filter(b=>b.title === title);
    dayBlocks.forEach(b => chain.push(b));
  }
  chain.sort((a,b)=>(a.dow - b.dow) || (minutesFromHHMM(a.start) - minutesFromHHMM(b.start)));
  return chain;
}

/* Кеш розподілу завдань по блоках — розраховується ОДИН раз на цикл renderWeek
   і заповнюється всіх ланцюжків (по title). Ключ — block.id → items/used. */
let _fillCache = null;
function invalidateFillCache(){ _fillCache = null; }
function buildFillCache(){
  const cache = { blocks: {} };
  // Групуємо блоки за title (весь тиждень, у правильному порядку)
  const titles = new Set();
  state.blocks.forEach(b=>titles.add(b.title));
  titles.forEach(title=>{
    // ВАЖЛИВО: past-блоки виключаємо з ланцюжка — у них нічого не показуємо і не пакуємо.
    const fullChain = getBlocksForWeek(title);
    const chain = fullChain.filter(b => !isBlockInPast(b));
    // Для past-блоків все одно треба створити пусті кеш-записи (щоб render не зламався)
    fullChain.forEach(b=>{ cache.blocks[b.id] = { items: [], used: 0 }; });
    if (!chain.length) return;
    // Всі задачі non-past блоків збираємо в одну чергу; пакуємо з першого non-past.
    const queue = [];
    chain.forEach(b=>{
      const own = state.tasks
        .filter(t => !t.done && t.weekId === state.weekStart && t.blockId === b.id)
        .map(t => ({...t, originBlock: b.id, originTitle: b.title}));
      own.forEach(t => queue.push(t));
    });
    for (const b of chain){
      const cap = minutesFromHHMM(b.end) - minutesFromHHMM(b.start);
      // Spacer — якщо перша задача у черзі має startMinInBlock і цей блок — її own
      const dropAtNow = queue.find(t=>t.startMinInBlock != null && t.originBlock === b.id);
      if (dropAtNow){
        const offset = Math.min(cap, Math.max(0, dropAtNow.startMinInBlock));
        cache.blocks[b.id].used = offset;
        if (offset > 0){
          cache.blocks[b.id].items.push({ _spacer: true, mins: offset, id: "_sp_"+b.id });
        }
      }
      while (queue.length && cache.blocks[b.id].used < cap){
        const t = queue.shift();
        const free = cap - cache.blocks[b.id].used;
        const take = Math.min(free, t.duration);
        cache.blocks[b.id].items.push({...t, mins:take, overflow: t.originBlock !== b.id});
        cache.blocks[b.id].used += take;
        if (take < t.duration){
          // Залишок — у наступний блок ланцюжка
          queue.unshift({...t, duration: t.duration-take, overflowed:true,
            title: t.title + (t.title.endsWith(" ↵") ? "" : " ↵")});
          break;
        }
      }
    }
  });
  return cache;
}

/* Сумісна функція для рендера одного блоку. Використовує кеш тижневого розподілу. */
function computeBlockFill(block, date){
  if (!_fillCache) _fillCache = buildFillCache();
  const capacity = minutesFromHHMM(block.end) - minutesFromHHMM(block.start);
  const entry = _fillCache.blocks[block.id] || { items: [], used: 0 };
  const items = entry.items.map(it=>{
    if (it._spacer) return { _spacer: true, mins: it.mins, id: it.id };
    const p = findProject(it.projectId);
    return { id: it.id, title: it.title, mins: it.mins, color: p?.color, done: it.done };
  });
  const used = entry.used;
  const pct = Math.min(1, used / capacity);
  // Колір від першого проекту у блоці
  let projectColor = null;
  const firstTask = entry.items.find(it=>!it._spacer);
  if (firstTask){
    const p = findProject(firstTask.projectId);
    projectColor = p?.color || null;
  }
  return { items, pct, usedMin: used, projectColor };
}

/* Перевірка: чи влізе task у ланцюжок блоків з цим title після призначення до newBlockId.
   Враховуємо ТІЛЬКИ блоки, що ще не пройшли (блоки в минулому пропускаємо). */
function chainFitsAfterAdding(title, task, newBlockId){
  const chain = getBlocksForWeek(title).filter(b=>!isBlockInPast(b));
  if (!chain.some(b=>b.id === newBlockId)) return false; // цей блок не з ланцюжка або у минулому
  const totalCap = chain.reduce((s,b)=>s + (minutesFromHHMM(b.end)-minutesFromHHMM(b.start)), 0);
  // Інші задачі у ланцюжку (не ця сама task)
  const others = state.tasks.filter(t =>
    !t.done && t.id !== task.id && t.weekId === state.weekStart &&
    chain.some(b=>b.id === t.blockId)
  );
  const otherDur = others.reduce((s,t)=>s + t.duration, 0);
  return (otherDur + task.duration) <= totalCap;
}

/* Миготіння блоку червоним — сигнал що task не помістилась у ланцюжок */
function flashBlockRed(el){
  if (!el) return;
  el.classList.add("flash-red");
  setTimeout(()=>el.classList.remove("flash-red"), 700);
}

/* Resize блоку: тягнемо верхній/нижній край щоб змінити start або end (крок 15 хв) */
function attachBlockResize(el, block){
  el.querySelectorAll(".wb-resize").forEach(handle=>{
    handle.addEventListener("pointerdown",(ev)=>{
      if (ev.button !== 0) return;
      ev.stopPropagation();
      const edge = handle.dataset.edge; // "top" або "bot"
      const startY = ev.clientY;
      const origStart = minutesFromHHMM(block.start);
      const origEnd   = minutesFromHHMM(block.end);
      handle.setPointerCapture?.(ev.pointerId);

      const onMove = (e)=>{
        const dy = e.clientY - startY;
        const dmin = Math.round(dy / HOUR_H * 60 / 15) * 15; // крок 15 хв
        if (edge === "top"){
          const newStart = Math.max(0, Math.min(origEnd - 15, origStart + dmin));
          block.start = hhmmFromMinutes(newStart);
        } else {
          const newEnd = Math.max(origStart + 15, Math.min(24*60, origEnd + dmin));
          block.end = hhmmFromMinutes(newEnd);
        }
        // Live-оновлення позиції/висоти без повного rerender
        const top = (minutesFromHHMM(block.start) - HOUR_START*60)/60 * HOUR_H;
        const height = (minutesFromHHMM(block.end) - minutesFromHHMM(block.start))/60 * HOUR_H;
        el.style.top = top + "px";
        el.style.height = height + "px";
      };
      const onUp = ()=>{
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
        el._suppressClick = true;
        persist(); renderWeek();
      };
      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
    });
  });
}

/* Drag блоку: перетягуємо за БУДЬ-ЯКУ частину (окрім wb-task і wb-resize);
   змінюємо dow та start/end (зберігаючи тривалість) */
function attachBlockDrag(el, block){
  el.addEventListener("pointerdown",(ev)=>{
    if (ev.button !== 0) return;
    // Не стартуємо drag, якщо натиснули на завдання всередині або ручку resize
    if (ev.target.closest(".wb-task")) return;
    if (ev.target.closest(".wb-resize")) return;
    ev.preventDefault();
    ev.stopPropagation();
    const startX = ev.clientX, startY = ev.clientY;
    const grid = document.getElementById("weekGrid");
    const gridRect = grid.getBoundingClientRect();
    const colWidth = grid.children[1]?.getBoundingClientRect().width || 100;
    let dragging = false;
    let origDow = block.dow;
    let origStart = minutesFromHHMM(block.start);
    let origEnd   = minutesFromHHMM(block.end);
    const duration = origEnd - origStart;

    const onMove = (e)=>{
      if (!dragging){
        if (Math.hypot(e.clientX-startX, e.clientY-startY) < 5) return;
        dragging = true;
        el.classList.add("dragging-block");
        el.setPointerCapture?.(ev.pointerId);
      }
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const ddow = Math.round(dx / colWidth);
      // 15-хвилинний крок по вертикалі
      const dmin = Math.round(dy / HOUR_H * 60 / 15) * 15;
      const newDow = Math.max(0, Math.min(6, origDow + ddow));
      const newStart = Math.max(0, Math.min(24*60 - duration, origStart + dmin));
      const newEnd = newStart + duration;
      // Візуально: зміщуємо el прямо
      const top = (newStart - HOUR_START*60)/60 * HOUR_H;
      el.style.top = top + "px";
      // Ctrl/Cmd → підсвічуємо «режим копіювання»
      el.classList.toggle("copy-mode", e.ctrlKey || e.metaKey);
      // Перенесемо в іншу колонку
      const targetCol = grid.children[1 + newDow];
      if (targetCol && el.parentElement !== targetCol) targetCol.appendChild(el);
      el._pendingDow = newDow;
      el._pendingStart = newStart;
      el._pendingEnd = newEnd;
    };
    const onUp = (e)=>{
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      el.classList.remove("dragging-block");
      el.classList.remove("copy-mode");
      if (!dragging) return;
      el._suppressClick = true;
      const isCopy = e.ctrlKey || e.metaKey;
      if (isCopy){
        // Ctrl/Cmd + drag → створюємо КОПІЮ блоку на новій позиції, оригінал лишаємо
        state.blocks.push({
          id: uid(),
          dow: el._pendingDow,
          start: hhmmFromMinutes(el._pendingStart),
          end:   hhmmFromMinutes(el._pendingEnd),
          title: block.title,
          color: block.color || null,
          weekId: block.weekId,
        });
      } else {
        // Звичайний drag — мутуємо оригінал
        block.dow = el._pendingDow;
        block.start = hhmmFromMinutes(el._pendingStart);
        block.end   = hhmmFromMinutes(el._pendingEnd);
      }
      persist();
      renderWeek();
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

/* Drag завдання, що знаходиться всередині блоку — переносити в інший блок */
function attachInBlockTaskDrag(tEl, task, blockEl){
  tEl.addEventListener("pointerdown",(ev)=>{
    if (ev.button !== 0) return;
    ev.stopPropagation();
    const startX = ev.clientX, startY = ev.clientY;
    let dragging = false;
    let ghost = null;
    let currentTarget = null;
    const onMove = (e)=>{
      if (!dragging){
        if (Math.hypot(e.clientX-startX, e.clientY-startY) < 5) return;
        dragging = true;
        ghost = document.createElement("div");
        ghost.className = "drag-ghost";
        ghost.textContent = task.title;
        document.body.appendChild(ghost);
        document.body.classList.add("dragging-task");
        tEl.classList.add("dragging");
      }
      ghost.style.left = e.clientX + "px";
      ghost.style.top  = e.clientY + "px";
      const below = document.elementFromPoint(e.clientX, e.clientY);
      const block = below?.closest(".wblock");
      if (block !== currentTarget){
        currentTarget?.classList.remove("drop-target");
        currentTarget = block;
        if (block && block !== blockEl) currentTarget.classList.add("drop-target");
      }
    };
    const onUp = (e)=>{
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      document.body.classList.remove("dragging-task");
      ghost?.remove();
      tEl.classList.remove("dragging");
      currentTarget?.classList.remove("drop-target");
      if (!dragging){ blockEl._suppressClick = false; return; }
      blockEl._suppressClick = true;
      const below = document.elementFromPoint(e.clientX, e.clientY);
      const targetBlockEl = below?.closest(".wblock");
      const taskListArea  = below?.closest("#taskList");
      if (targetBlockEl){
        const newBlockId = targetBlockEl.dataset.blockId;
        if (newBlockId && newBlockId !== task.blockId){
          const newBlock = state.blocks.find(b=>b.id === newBlockId);
          // Блок повністю в минулому — забороняємо drop
          if (newBlock && isBlockInPast(newBlock)){
            flashBlockRed(targetBlockEl);
            return;
          }
          if (newBlock && !chainFitsAfterAdding(newBlock.title, task, newBlockId)){
            flashBlockRed(targetBlockEl);
            return;
          }
          const actual = firstFreeBlockInChain(newBlock.title, task) || newBlock;
          task.blockId = actual.id;
          task.weekId  = state.weekStart;
          maybeSetDropAtNow(task, actual.id);
          persist(); renderWeek(); renderTaskList();
        }
      } else {
        // Drop поза блоком (у список задач або просто на порожнє місце) → відв'язуємо
        task.blockId = null;
        delete task.startMinInBlock;
        persist(); renderWeek(); renderTaskList();
      }
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

// Гарантує, що для task вистачає місця у ланцюжку блоків з тою ж назвою того ж дня;
// якщо ні — автоматично створює новий блок з тою ж назвою, щоб overflow мав куди перетекти.
function ensureOverflowBlock(task, blockId){
  const block = state.blocks.find(b=>b.id===blockId);
  if (!block) return;
  // Дата цього блоку у поточному тижні
  const ws = parseISO(state.weekStart);
  const dayDate = addDays(ws, block.dow);
  const dayISO = iso(dayDate);
  const allForDay = getBlocksForDay(block.dow, dayISO).slice().sort((a,b)=>minutesFromHHMM(a.start)-minutesFromHHMM(b.start));
  const sameTitle = allForDay.filter(b=>b.title === block.title);
  const totalCap = sameTitle.reduce((s,b)=>s + (minutesFromHHMM(b.end)-minutesFromHHMM(b.start)), 0);
  // Усі задачі, приписані до блоків цього ланцюжка
  const tasksInChain = state.tasks.filter(t=>
    !t.done && t.weekId===state.weekStart &&
    sameTitle.some(b=>b.id===t.blockId)
  );
  const totalNeeded = tasksInChain.reduce((s,t)=>s+t.duration, 0);
  if (totalNeeded <= totalCap) return;
  const overflow = totalNeeded - totalCap;
  // Знаходимо вільний слот одразу після останнього блоку з тою ж назвою
  const last = sameTitle[sameTitle.length-1];
  let freeStart = minutesFromHHMM(last.end);
  for (const b of allForDay){
    const bs = minutesFromHHMM(b.start);
    const be = minutesFromHHMM(b.end);
    if (be <= freeStart) continue;
    if (bs > freeStart) break; // знайшли вільне вікно
    freeStart = be; // зсуваємось за цей блок
  }
  const newStart = Math.min(freeStart, 24*60 - 15);
  const newEnd   = Math.min(24*60, newStart + Math.max(15, overflow));
  if (newEnd <= newStart) return;
  state.blocks.push({
    id: uid(),
    dow: block.dow,
    start: hhmmFromMinutes(newStart),
    end:   hhmmFromMinutes(newEnd),
    title: block.title,
    color: block.color || null,
    weekId: block.weekId,
  });
}

// Перевіряє чи блок повністю у минулому (його кінець раніше поточного часу).
// Для днів тижня, які вже минули — true. Для майбутніх — false.
// Для сьогодні — порівнюємо block.end з поточною хвилиною.
function isBlockInPast(block){
  const ws = parseISO(state.weekStart);
  const blockDate = addDays(ws, block.dow);
  const today = new Date(); today.setHours(0,0,0,0);
  if (blockDate.getTime() < today.getTime()) return true;
  if (blockDate.getTime() > today.getTime()) return false;
  // Сьогодні — порівнюємо кінець блоку з поточним часом
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  return minutesFromHHMM(block.end) <= nowMin;
}

// Перший блок ланцюжка (з тою ж назвою), у якому ще є вільне місце для task.
// Пропускаємо блоки, що вже в минулому — task не може попасти у block, який вже пройшов.
function firstFreeBlockInChain(title, task){
  const chain = getBlocksForWeek(title);
  for (const b of chain){
    if (isBlockInPast(b)) continue;
    const cap = minutesFromHHMM(b.end) - minutesFromHHMM(b.start);
    const others = state.tasks.filter(t =>
      !t.done && t.id !== task.id && t.weekId === state.weekStart && t.blockId === b.id
    );
    const used = others.reduce((s,t)=>s + t.duration, 0);
    if (used < cap) return b;
  }
  return null;
}

// Якщо drop у блок, що містить поточну позицію часу — позначаємо стартову точку
function maybeSetDropAtNow(task, blockId){
  const b = state.blocks.find(x=>x.id===blockId);
  if (!b) return;
  const now = new Date();
  const todayDow = (now.getDay()+6)%7;
  if (b.dow !== todayDow) { delete task.startMinInBlock; return; }
  const nowMin = now.getHours()*60 + now.getMinutes();
  const bs = minutesFromHHMM(b.start), be = minutesFromHHMM(b.end);
  if (nowMin >= bs && nowMin <= be){
    task.startMinInBlock = nowMin - bs; // зсув від початку блоку
  } else {
    delete task.startMinInBlock;
  }
}

function isTipDismissed(id){
  const d = state.settings?.dismissedTips || [];
  return d.includes(id);
}
function dismissTip(id){
  state.settings = state.settings || {};
  state.settings.dismissedTips = [...(state.settings.dismissedTips||[]), id];
  persist();
  renderTips();
}
function renderTips(){
  const layer = document.getElementById("tipLayer");
  if (!layer) return;
  layer.innerHTML = "";
  if (!state.settings || state.settings.tipsEnabled === false) return;
  const currentView = state.ui?.view || "gantt";
  TIPS.forEach(tip=>{
    if (isTipDismissed(tip.id)) return;
    if (tip.viewOnly && tip.viewOnly !== currentView) return;
    const target = document.querySelector(tip.target);
    if (!target) return;
    const rect = target.getBoundingClientRect();
    if (rect.width === 0 && rect.height === 0) return; // елемент схований
    const bubble = document.createElement("div");
    bubble.className = "tip-bubble arrow-" + (tip.arrow || "up");
    bubble.innerHTML = `${escapeHtml(tip.text)}<span class="tip-close" data-tip-id="${tip.id}">×</span>`;
    // Позиціонування bubble відносно target-а
    let top, left;
    if (tip.arrow === "up"){
      top  = rect.bottom + 10;
      left = rect.left;
    } else if (tip.arrow === "down"){
      top  = rect.top - 10;
      left = rect.left;
    } else if (tip.arrow === "left"){
      top  = rect.top + 10;
      left = rect.right + 10;
    } else {
      top  = rect.bottom + 10;
      left = rect.left;
    }
    // Не даємо вилізти за правий край екрану
    const maxLeft = window.innerWidth - 260;
    if (left > maxLeft) left = maxLeft;
    if (left < 8) left = 8;
    bubble.style.top  = top + "px";
    bubble.style.left = left + "px";
    layer.appendChild(bubble);
  });
  // Один делегований обробник для всіх "×"
  layer.onclick = (e)=>{
    const btn = e.target.closest(".tip-close");
    if (btn) dismissTip(btn.dataset.tipId);
  };
}
// Оновлюємо підказки при рендері

// Видаляє всі блоки з такою ж назвою, які йдуть ПІСЛЯ `block` у ланцюжку тижня.
function deleteLaterBlocksWithSameTitle(block){
  const chain = getBlocksForWeek(block.title);
  const idx = chain.findIndex(b=>b.id === block.id);
  if (idx < 0) return 0;
  const toRemove = chain.slice(idx+1).map(b=>b.id);
  if (!toRemove.length) return 0;
  state.blocks = state.blocks.filter(b => !toRemove.includes(b.id));
  // Відв'язуємо задачі від видалених блоків
  state.tasks.forEach(t=>{ if (toRemove.includes(t.blockId)) t.blockId = null; });
  return toRemove.length;
}

function editBlock(block){
  const isTemplate = block.weekId === null;
  openModal({
    title: isTemplate ? "Block (Vorlage – wöchentlich)" : "Block (nur diese Woche)",
    // Прибрали select "scope" та checkbox "daily" — щоб блок випадково НЕ поширювався
    // на інші дні/тижні. Для цього є окремі кнопки знизу модалу.
    fields:[
      { key:"title", label:"Titel", value: block.title},
      { key:"start", label:"Start", type:"time", value: block.start},
      { key:"end",   label:"Ende",  type:"time", value: block.end},
      { key:"dow",   label:"Wochentag", type:"select", value:String(block.dow),
        options:["Mo","Di","Mi","Do","Fr","Sa","So"].map((n,i)=>({id:String(i), name:n}))},
      { key:"color", label:"Farbe", type:"color-pick", value: block.color || "#9a9a95" },
    ],
    onDelete:()=>{
      // Видаляємо не лише override цього тижня, а й template з тою ж назвою/dow/start —
      // інакше template "виринає" на місце видаленого override і блок виглядає пунктирним.
      const idsToRemove = state.blocks
        .filter(b => b.id === block.id ||
          (b.title === block.title && b.dow === block.dow && b.start === block.start))
        .map(b => b.id);
      state.blocks = state.blocks.filter(b => !idsToRemove.includes(b.id));
      state.tasks.forEach(t => { if (idsToRemove.includes(t.blockId)) t.blockId = null; });
      closeModal(); renderWeek(); persist();
    },
    // Усі поширення блоку (на наступний день / щодня / на кожен тиждень) —
    // явні дії через кнопки. Жоден із параметрів редактора блоку не розширює його автоматично.
    extraAction: [
      {
        label: "→ Auf nächsten Tag kopieren",
        fn: ()=>{
          const nextDow = (block.dow + 1) % 7;
          state.blocks.push({
            id: uid(),
            dow: nextDow,
            start: block.start,
            end: block.end,
            title: block.title,
            color: block.color || null,
            weekId: block.weekId,
          });
          closeModal(); renderWeek(); persist();
        }
      },
      {
        label: "Jeden Tag duplizieren (7 Tage)",
        fn: ()=>{
          if (!confirm(`Block "${block.title}" auf alle 7 Wochentage duplizieren?`)) return;
          for (let d=0; d<7; d++){
            if (d === block.dow) continue;
            const exists = state.blocks.some(b=>b.dow===d && b.title===block.title && b.start===block.start && b.weekId===block.weekId);
            if (exists) continue;
            state.blocks.push({
              id: uid(),
              dow: d,
              start: block.start,
              end: block.end,
              title: block.title,
              color: block.color || null,
              weekId: block.weekId,
            });
          }
          closeModal(); renderWeek(); persist();
        }
      },
      {
        label: isTemplate ? "Nur diese Woche behalten" : "Als wöchentliche Vorlage markieren",
        fn: ()=>{
          // Перемикає між template (weekId=null) та override (weekId=state.weekStart)
          block.weekId = isTemplate ? state.weekStart : null;
          closeModal(); renderWeek(); persist();
        }
      },
      {
        label: "Folge-Blöcke gleicher Name löschen",
        fn: ()=>{
          if (!confirm(`Alle nachfolgenden Blöcke mit dem Namen "${block.title}" löschen?`)) return;
          const n = deleteLaterBlocksWithSameTitle(block);
          if (n === 0){
            alert("Keine nachfolgenden Blöcke mit gleichem Namen gefunden.");
            return;
          }
          closeModal(); renderWeek(); persist();
        }
      },
      {
        label: "Alle Blöcke mit diesem Namen löschen",
        fn: ()=>{
          if (!confirm(`Alle Blöcke mit dem Namen "${block.title}" (alle Tage, alle Wochen) löschen?`)) return;
          const idsToRemove = state.blocks
            .filter(b => b.title === block.title)
            .map(b => b.id);
          state.blocks = state.blocks.filter(b => !idsToRemove.includes(b.id));
          state.tasks.forEach(t => { if (idsToRemove.includes(t.blockId)) t.blockId = null; });
          closeModal(); renderWeek(); persist();
        }
      },
    ],
    onSubmit:(v)=>{
      block.title = v.title.trim() || block.title;
      block.start = v.start; block.end = v.end;
      block.dow = Number(v.dow);
      block.color = v.color || null;
      // weekId НЕ змінюємо через форму — лише через окрему кнопку вище (Vorlage/diese Woche).
      if (minutesFromHHMM(block.end) <= minutesFromHHMM(block.start)){
        block.end = hhmmFromMinutes(minutesFromHHMM(block.start)+30);
      }
      closeModal(); renderWeek(); persist();
    }
  });
}

function renderTaskList(){
  const host = document.getElementById("taskList"); if (!host) return;
  host.innerHTML = "";

  const shown = state.tasks.filter(t=>{
    if (state.selectedProjectId && t.projectId !== state.selectedProjectId) return false;
    return true;
  });

  // group: unassigned first, then by project
  const unassigned = shown.filter(t=>!t.blockId);
  const assigned   = shown.filter(t=> t.blockId);

  if (unassigned.length){
    const h = document.createElement("div");
    h.style.cssText = "font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-4);padding:8px 8px 4px";
    h.textContent = "Offen · "+unassigned.length;
    host.appendChild(h);
    unassigned.forEach(t=>host.appendChild(buildTaskNode(t)));
  }
  if (assigned.length){
    const h = document.createElement("div");
    h.style.cssText = "font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-4);padding:12px 8px 4px";
    h.textContent = "Geplant · "+assigned.length;
    host.appendChild(h);
    assigned.forEach(t=>host.appendChild(buildTaskNode(t)));
  }
  if (!shown.length){
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = "Keine Aufgaben";
    host.appendChild(e);
  }
  document.getElementById("taskCount").textContent = shown.length;
}
function buildTaskNode(t){
  const p = findProject(t.projectId);
  const el = document.createElement("div");
  el.className = "task-item" + (t.done ? " done" : "") + (t.blockId ? " assigned" : "");
  el.dataset.taskId = t.id;
  el.innerHTML = `
    <div class="check"></div>
    <div class="swatch" style="background:${p?.color || 'var(--ink-4)'}"></div>
    <div class="tbody">
      <div class="ttitle">${escapeHtml(t.title)}</div>
      <div class="tmeta"><span class="tdur">${t.duration}m</span> · <span class="proj">${escapeHtml(projectPath(t) || "—")}</span></div>
    </div>
  `;
  // check toggle
  el.querySelector(".check").addEventListener("click",(e)=>{
    e.stopPropagation();
    t.done = !t.done; persist(); renderTaskList(); renderWeek();
  });
  // click to edit
  el.addEventListener("click",()=>editWeekTask(t));
  // drag to week
  attachTaskDrag(el, t);
  return el;
}

function attachTaskDrag(el, t){
  el.addEventListener("pointerdown",(ev)=>{
    // ignore click-only
    if (ev.target.closest(".check")) return;
    const startX = ev.clientX, startY = ev.clientY;
    let dragging = false;
    let ghost = null;
    let currentTarget = null;

    const onMove = (e)=>{
      if (!dragging){
        if (Math.hypot(e.clientX-startX, e.clientY-startY) > 4){
          dragging = true;
          ghost = document.createElement("div");
          ghost.className = "drag-ghost";
          ghost.textContent = t.title;
          document.body.appendChild(ghost);
          document.body.classList.add("dragging-task");
          el.classList.add("dragging");
        } else return;
      }
      ghost.style.left = e.clientX+"px";
      ghost.style.top  = e.clientY+"px";

      const below = document.elementFromPoint(e.clientX, e.clientY);
      const block = below?.closest(".wblock");
      if (block !== currentTarget){
        currentTarget?.classList.remove("drop-target");
        currentTarget = block;
        currentTarget?.classList.add("drop-target");
      }
      // Also detect dropping on empty day area (create a new block)
    };
    const onUp = (e)=>{
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      document.body.classList.remove("dragging-task");
      ghost?.remove();
      el.classList.remove("dragging");
      currentTarget?.classList.remove("drop-target");
      if (!dragging){ return; }

      const below = document.elementFromPoint(e.clientX, e.clientY);
      const block = below?.closest(".wblock");
      const col   = below?.closest(".week-daycol");

      if (block){
        const b = state.blocks.find(x=>x.id===block.dataset.blockId);
        if (b){
          // Блок повністю в минулому — забороняємо drop
          if (isBlockInPast(b)){
            flashBlockRed(block);
            return;
          }
          if (!chainFitsAfterAdding(b.title, t, b.id)){
            flashBlockRed(block);
            return;
          }
          const actual = firstFreeBlockInChain(b.title, t) || b;
          t.blockId = actual.id;
          t.weekId = state.weekStart;
          maybeSetDropAtNow(t, actual.id);
          persist(); renderWeek(); renderTaskList();
          return;
        }
      }
      if (col && !block){
        // Drop on an empty area of a day → create a block filled with this task
        const r = col.getBoundingClientRect();
        const y = e.clientY - r.top;
        const mins = HOUR_START*60 + Math.floor(y / HOUR_H * 60 / 15) * 15;
        const dow = Number(col.dataset.dayIndex);
        const duration = t.duration || 60;
        const b = {
          id: uid(), dow,
          start: hhmmFromMinutes(mins),
          end:   hhmmFromMinutes(Math.min(24*60, mins + Math.max(30, duration))),
          title: t.title,
          weekId: state.weekStart
        };
        state.blocks.push(b);
        t.blockId = b.id; t.weekId = state.weekStart;
        persist(); renderWeek(); renderTaskList();
        return;
      }
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

  const prevWeek = iso(addDays(parseISO(state.weekStart), -7));
  const prevBlocks = state.blocks.filter(b=>b.weekId===prevWeek);
  if (!prevBlocks.length){
    toast("Keine abweichenden Blöcke in der vorherigen Woche.");
    return;
  }
  // Remove this-week overrides first
  state.blocks = state.blocks.filter(b=>b.weekId!==state.weekStart);
  // Copy previous week's overrides to this week
  prevBlocks.forEach(b=>{
    state.blocks.push({ ...b, id: uid(), weekId: state.weekStart });
  });
  persist(); renderWeek();
  toast("Übernommen: "+prevBlocks.length+" Blöcke");
};

function renderCalendar(){
  const d = parseISO(state.calCursor);
  document.getElementById("calMonthName").textContent = d.toLocaleDateString("de-DE",{month:"long"});
  document.getElementById("calYear").textContent = d.getFullYear();

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  // day-of-week header
  ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(n=>{
    const el = document.createElement("div"); el.className="dow"; el.textContent = n;
    grid.appendChild(el);
  });

  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const startGrid = mondayOf(first);
  const last = new Date(d.getFullYear(), d.getMonth()+1, 0);
  const endGrid = addDays(mondayOf(last), 6);
  const today = new Date(); today.setHours(0,0,0,0);

  let cursor = new Date(startGrid);
  while (cursor <= endGrid){
    // week header row for this row of 7 days
    const wnum = weekNumber(cursor);
    const wstart = iso(cursor);
    const wkEl = document.createElement("div");
    wkEl.className = "cal-wk";
    wkEl.innerHTML = `<span>Kalenderwoche ${wnum}</span><span class="gotoweek">Zur Wochenansicht ›</span>`;
    wkEl.onclick = ()=>{ state.weekStart = wstart; setView("week"); persist(); };
    grid.appendChild(wkEl);

    for (let i=0; i<7; i++){
      const cell = document.createElement("div");
      cell.className = "cal-cell";
      if (cursor.getMonth() !== d.getMonth()) cell.classList.add("out");
      if (sameDay(cursor, today)) cell.classList.add("today");
      cell.innerHTML = `<div class="d">${cursor.getDate()}</div>`;
      // dots: projects active on this day
      const dayISO = iso(cursor);
      const activeProjects = new Set();
      state.ganttTasks.forEach(t=>{
        if (parseISO(t.start) <= parseISO(dayISO) && parseISO(t.end) >= parseISO(dayISO)){
          activeProjects.add(t.projectId);
        }
      });
      if (activeProjects.size){
        const dots = document.createElement("div"); dots.className="dots";
        [...activeProjects].slice(0,6).forEach(pid=>{
          const p = findProject(pid);
          const s = document.createElement("span");
          s.style.background = p?.color || "#999";
          dots.appendChild(s);
        });
        cell.appendChild(dots);
      }
      const cellDate = new Date(cursor);
      cell.onclick = ()=>{
        state.weekStart = iso(mondayOf(cellDate));
        setView("week");
        persist();
      };
      grid.appendChild(cell);
      cursor = addDays(cursor, 1);
    }
  }
}

document.getElementById("calPrev").onclick = ()=>{ const d=parseISO(state.calCursor); d.setMonth(d.getMonth()-1); state.calCursor=iso(d); renderCalendar(); renderDateNav(); persist(); };
document.getElementById("calNext").onclick = ()=>{ const d=parseISO(state.calCursor); d.setMonth(d.getMonth()+1); state.calCursor=iso(d); renderCalendar(); renderDateNav(); persist(); };
document.getElementById("calToday").onclick = ()=>{ state.calCursor = iso(new Date()); renderCalendar(); renderDateNav(); persist(); };

/* ═══════════════════════════════════════════════════════════════
   9. MODAL
   ═══════════════════════════════════════════════════════════════ */

function openModal({ title, fields, onSubmit, onDelete, extraAction }){
  const root = document.getElementById("modalRoot");
  const box  = document.getElementById("modalBox");
  // Нормалізуємо extraAction до масиву — щоб можна було передавати кілька кнопок
  const extras = Array.isArray(extraAction) ? extraAction : (extraAction ? [extraAction] : []);
  box.innerHTML = `
    <h3>${escapeHtml(title)}</h3>
    <form id="modalForm">
      ${fields.map(f=>fieldHtml(f)).join("")}
      <div class="modal-actions">
        <div class="left">
          ${onDelete ? `<button type="button" class="btn btn-danger" data-act="delete">Löschen</button>` : ""}
          ${extras.map((ex,i)=>`<button type="button" class="btn btn-ghost" data-act="extra-${i}">${escapeHtml(ex.label)}</button>`).join("")}
        </div>
        <div class="right">
          <button type="button" class="btn btn-ghost" data-act="cancel">Abbrechen</button>
          <button type="submit" class="btn btn-primary">Speichern</button>
        </div>
      </div>
    </form>
  `;
  root.classList.add("open");
  const form = box.querySelector("#modalForm");
  form.onsubmit = (e)=>{
    e.preventDefault();
    const v = {};
    fields.forEach(f=>{
      // color-pick не має input з name — збираємо його окремо з активного swatch
      if (f.type === "color-pick"){
        v[f.key] = form.querySelector('.color-row .sw.active')?.dataset.color || f.value;
        return;
      }
      const el = form.querySelector(`[name="${f.key}"]`);
      if (!el) return;
      if (f.type==="check") v[f.key] = el.checked;
      else v[f.key] = el.value;
    });
    onSubmit(v);
  };
  box.querySelectorAll("[data-act]").forEach(b=>{
    b.onclick = ()=>{
      const act = b.dataset.act;
      if (act==="cancel") closeModal();
      if (act==="delete"){
        if (confirm("Wirklich löschen?")) onDelete?.();
      }
      // extra-0, extra-1, ... — викликаємо відповідну функцію з масиву
      if (act.startsWith("extra-")){
        const idx = Number(act.slice(6));
        extras[idx]?.fn?.();
      }
    };
  });
  // color picker clicks
  box.querySelectorAll(".color-row").forEach(row=>{
    row.addEventListener("click",(e)=>{
      const sw = e.target.closest(".sw"); if(!sw) return;
      row.querySelectorAll(".sw").forEach(s=>s.classList.remove("active"));
      sw.classList.add("active");
    });
  });
  // focus first
  setTimeout(()=>box.querySelector("input, select, textarea")?.focus(), 50);
}
function closeModal(){ document.getElementById("modalRoot").classList.remove("open"); }
// Модал закривається ЛИШЕ через кнопку (Abbrechen/Speichern) або Escape.
// Клік поза модалом НЕ закриває його (запобігаємо випадковій втраті введених даних).
window.addEventListener("keydown",(e)=>{ if (e.key==="Escape") closeModal(); });

function fieldHtml(f){
  const name = f.key;
  if (f.type==="select"){
    return `<div class="field"><label>${f.label}</label>
      <select name="${name}">${f.options.map(o=>`<option value="${o.id}" ${String(o.id)===String(f.value)?'selected':''}>${escapeHtml(o.name)}</option>`).join("")}</select></div>`;
  }
  if (f.type==="date")   return `<div class="field"><label>${f.label}</label><input type="date" name="${name}" value="${f.value||''}"></div>`;
  if (f.type==="time")   return `<div class="field"><label>${f.label}</label><input type="time" name="${name}" value="${f.value||''}"></div>`;
  if (f.type==="number") return `<div class="field"><label>${f.label}</label><input type="number" name="${name}" value="${f.value||''}" min="0"></div>`;
  if (f.type==="check")  return `<div class="field" style="display:flex;align-items:center;gap:8px"><input type="checkbox" name="${name}" ${f.value?'checked':''}><label style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink)">${f.label}</label></div>`;
  if (f.type==="color-pick"){
    return `<div class="field"><label>${f.label}</label>
      <div class="color-row">${PALETTE.map(c=>`<div class="sw ${c===f.value?'active':''}" data-color="${c}" style="background:${c}"></div>`).join("")}</div>
    </div>`;
  }
  return `<div class="field"><label>${f.label}</label><input type="text" name="${name}" value="${escapeHtml(f.value||'')}"></div>`;
}

/* ═══════════════════════════════════════════════════════════════
   10. TOAST
   ═══════════════════════════════════════════════════════════════ */
function toast(msg){
  let el = document.getElementById("toast");
  if (!el){
    el = document.createElement("div");
    el.id = "toast";
    el.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;z-index:300;opacity:0;transition:opacity .2s";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity="0"; }, 2000);
}

   11. BOOT
   ═══════════════════════════════════════════════════════════════ */

// Зберігаємо unsubscribe від Firestore, щоб відписуватись при зміні користувача
let unsubscribeStore = null;

// Завантаження даних та повний рендер (викликається після входу або одразу в локальному режимі)
async function bootLoadData(){
  const loaded = await Store.load();
  if (loaded){
    // Мерж: зберігаємо поля з БД, додаємо відсутні дефолти
    state = { ...defaultState(), ...loaded };
    // Гарантуємо, що масиви існують
    state.projects ||= [];
    state.ganttTasks ||= [];
    state.blocks ||= [];
    state.tasks ||= [];
  } else {
    // Немає даних у користувача — починаємо з дефолтних
    state = defaultState();
  }
  render();
  // Відновлюємо останній активний вид (gantt/week/calendar) після перезавантаження
  const lastView = state.lastView;
  if (lastView && ["gantt","week","calendar"].includes(lastView)){
    setView(lastView);
  }
  // Відписуємось від попередньої підписки (якщо була)
  if (unsubscribeStore){ try{ unsubscribeStore(); }catch{} unsubscribeStore = null; }
  unsubscribeStore = Store.subscribe((data)=>{
    state = { ...state, ...data };
    render();
  });
}

// Обробка регулярного оновлення "червоної лінії" поточного часу у Gantt
function startNowLineTick(){
  setInterval(()=>{
    if ((state.ui?.view||"gantt")==="gantt"){
      const dayW = getDayW();
      const nowMs = Date.now();
      const startMs = parseISO(state.ganttStart).getTime();
      const fracDays = (nowMs - startMs) / 86400000;
      const nowLine = document.getElementById("ganttNow");
      if (!nowLine) return;
      if (fracDays>=0 && fracDays<=GANTT_DAYS){
        nowLine.style.display=""; nowLine.style.left=(220+fracDays*dayW)+"px";
      } else nowLine.style.display="none";
    }
  }, 60000);
}

(async function boot(){
  // Підключаємо обробники кнопок входу/виходу
  document.getElementById("googleSignInBtn").addEventListener("click", signInGoogle);
  document.getElementById("signOutBtn").addEventListener("click", signOutUser);

  // Повзунок масштабу Gantt: змінює ширину дня і перемальовує діаграму
  const zoomEl = document.getElementById("ganttZoom");
  zoomEl.addEventListener("input", (e)=>{
    state.ganttDayW = Number(e.target.value) || 56;
    renderGantt();
    persist();
  });

  // Кнопка налаштувань: відкриває модал
  document.getElementById("settingsBtn").addEventListener("click", openSettings);
  // Кнопка "Назад" (undo)
  document.getElementById("undoBtn").addEventListener("click", undoLastAction);
  // Гарячі клавіші: Ctrl/Cmd+Z — undo
  window.addEventListener("keydown",(e)=>{
    if ((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key.toLowerCase()==="z"){
      if (!document.activeElement?.matches?.("input,textarea,select")){
        e.preventDefault();
        undoLastAction();
      }
    }
  });

  startNowLineTick();

  if (useFirebase){
    // Чекаємо на стан авторизації Firebase
    document.getElementById("loginHint").textContent = "Ваші дані синхронізуються через Firebase.";
    fauthMod.onAuthStateChanged(fauth, async (user) => {
      currentUser = user;
      if (user){
        // Користувач увійшов — ховаємо login, показуємо додаток
        showLogin(false);
        renderUserInfo();
        await bootLoadData();
      } else {
        // Не увійшов — показуємо екран входу, чистимо додаток
        renderUserInfo();
        showLogin(true);
      }
    });
  } else {
    // Локальний режим без Firebase — одразу завантажуємо дані
    showLogin(false);
    renderUserInfo();
    await bootLoadData();
  }
})();
